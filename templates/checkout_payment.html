<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Payment...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="background: var(--bg-grad-1); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Inter', sans-serif;">

    <div style="text-align: center; background: var(--glass-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);">
        <div class="loader" style="border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <h2>Initializing Secure Payment</h2>
        <p>Please do not refresh this page...</p>
        <p style="font-size: 0.9rem; color: #94a3b8;">Amount to pay: ₹{{ "%.2f"|format(total_price) }}</p>
    </div>

    <form id="razorpay-form" action="{{ url_for('verify_payment') }}" method="POST">
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
    </form>

    <script>
        var options = {
            "key": "{{ key_id }}",
            "amount": "{{ amount }}", 
            "currency": "INR",
            "name": "E-Commerce Website",
            "description": "Payment for your order",
            "image": "https://placehold.co/200x200/6366f1/ffffff?text=Shop",
            "order_id": "{{ order_id }}",
            "handler": function (response){
                document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                document.getElementById('razorpay_signature').value = response.razorpay_signature;
                document.getElementById('razorpay-form').submit();
            },
            "prefill": {
                "name": "{{ session.username }}",
                "email": "" // You can add email to session if needed
            },
            "theme": {
                "color": "#6366f1"
            },
            "modal": {
                "ondismiss": function(){
                    window.location.replace("/cart");
                }
            }
        };
        var rzp1 = new Razorpay(options);
        
        // Open Razorpay on page load
        window.onload = function() {
            rzp1.open();
        };
    </script>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
