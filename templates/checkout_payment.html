<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Payment...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body style="background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Inter', sans-serif;">

    <div id="payment-container" style="text-align: center; background: var(--glass-bg); padding: 40px 50px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); max-width: 400px;">
        <div class="loader" style="border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <h2 style="margin-bottom: 10px;">Initializing Secure Payment</h2>
        <p style="margin: 10px 0;">Please do not refresh this page...</p>
        <p style="font-size: 0.9rem; color: #94a3b8; margin: 5px 0 25px;">Amount to pay: ₹{{ "%.2f"|format(total_price) }}</p>
        
        <!-- Fallback buttons (hidden initially, shown if Razorpay fails) -->
        <div id="payment-fallback" style="display: none;">
            <p style="color: #ff6b6b; margin-bottom: 20px;">⚠️ Payment gateway could not be loaded.</p>
            <a href="/cart" style="display: inline-block; padding: 12px 30px; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); color: white; border-radius: 20px; text-decoration: none; font-weight: 600;">Return to Cart</a>
        </div>

        <!-- Cancel button always visible -->
        <div style="margin-top: 20px;">
            <a href="/cart" style="color: #94a3b8; font-size: 13px; text-decoration: underline;">Cancel and return to cart</a>
        </div>
    </div>

    <form id="razorpay-form" action="{{ url_for('verify_payment') }}" method="POST">
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
    </form>

    <script>
        var paymentFailed = false;

        try {
            var options = {
                "key": "{{ key_id }}",
                "amount": "{{ amount }}", 
                "currency": "INR",
                "name": "E-Commerce Website",
                "description": "Payment for your order",
                "image": "https://placehold.co/200x200/6366f1/ffffff?text=Shop",
                "order_id": "{{ order_id }}",
                "handler": function (response){
                    document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                    document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                    document.getElementById('razorpay_signature').value = response.razorpay_signature;
                    document.getElementById('razorpay-form').submit();
                },
                "prefill": {
                    "name": "{{ session.username }}",
                    "email": ""
                },
                "theme": {
                    "color": "#6366f1"
                },
                "modal": {
                    "ondismiss": function(){
                        window.location.replace("/cart");
                    }
                }
            };
            var rzp1 = new Razorpay(options);
            
            rzp1.on('payment.failed', function (response){
                document.getElementById('payment-fallback').style.display = 'block';
                document.querySelector('.loader').style.display = 'none';
            });

            // Open Razorpay on page load
            window.onload = function() {
                try {
                    rzp1.open();
                } catch(e) {
                    document.getElementById('payment-fallback').style.display = 'block';
                    document.querySelector('.loader').style.display = 'none';
                }
            };
        } catch(e) {
            // Razorpay JS failed to load
            window.onload = function() {
                document.getElementById('payment-fallback').style.display = 'block';
                document.querySelector('.loader').style.display = 'none';
            };
        }
    </script>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
