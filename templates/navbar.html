<nav class="glass p-2 rounded flex items-center justify-between">
    <div class="flex items-center">
        <a href="{{ url_for('dashboard') }}" class="text-2xl font-semibold" style="color: var(--primary-color);">
            <img src="{{ url_for('static', filename='logo_placeholder_1779430781435.png') }}" alt="Logo" style="height: 40px; vertical-align: middle;" />
            <span class="ml-2">Mart</span>
        </a>
    </div>
    <div class="hidden md:flex space-x-4 items-center">
        <a href="{{ url_for('dashboard') }}" class="nav-link" style="color: var(--text-light);">Home</a>
        <a href="{{ url_for('cart') }}" class="nav-link" style="color: var(--text-light);">Cart</a>
        <a href="{{ url_for('profile') }}" class="nav-link" style="color: var(--text-light);">Profile</a>
        {% if session.get('is_admin') %}
        <a href="{{ url_for('admin_dashboard') }}" class="nav-link" style="color: var(--text-light);">Admin</a>
        {% endif %}
    </div>
    <div class="flex items-center space-x-2">
        <button id="theme-toggle" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">🌙</button>
        <button class="md:hidden btn" id="mobile-menu-toggle">☰</button>
    </div>
</nav>
<!-- Mobile menu -->
<div id="mobile-menu" class="hidden glass p-2 mt-2 rounded">
    <a href="{{ url_for('dashboard') }}" class="block mb-2" style="color: var(--text-light);">Home</a>
    <a href="{{ url_for('cart') }}" class="block mb-2" style="color: var(--text-light);">Cart</a>
    <a href="{{ url_for('profile') }}" class="block mb-2" style="color: var(--text-light);">Profile</a>
    {% if session.get('is_admin') %}
    <a href="{{ url_for('admin_dashboard') }}" class="block mb-2" style="color: var(--text-light);">Admin</a>
    {% endif %}
</div>
<script>
    const toggle = document.getElementById('theme-toggle');
    const mobileToggle = document.getElementById('mobile-menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    toggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        toggle.textContent = newTheme === 'dark' ? '🌞' : '🌙';
    });
    mobileToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
    // Initialize theme from localStorage
    const stored = localStorage.getItem('theme');
    if (stored) {
        document.documentElement.setAttribute('data-theme', stored);
        toggle.textContent = stored === 'dark' ? '🌞' : '🌙';
    }
</script>
