<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset your NeoCart account password." />
    <title>Reset Password – NeoCart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script>
      (function(){
        var t = localStorage.getItem('theme');
        if(t) document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
</head>
<body class="auth-body">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages" style="position:fixed;top:1rem;right:1rem;z-index:9999;width:320px;">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div id="container" style="min-height: 480px; display: flex; align-items: center; justify-content: center; width: 480px;">
        <div class="form-container" style="position: static; width: 100%; padding: 2.5rem 2.8rem;">
            <form action="/reset-password" method="POST" style="width: 100%;">
                <div class="auth-logo-wrapper">
                    <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="NeoCart Logo" class="auth-logo" />
                </div>
                <h2>Reset Password</h2>
                <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 1.25rem;">
                    Please enter the OTP sent to your registered phone number, and enter your new password.
                </p>
                
                <input type="text" name="otp" placeholder="6-Digit OTP Code" required style="text-align: center; font-size: 1.1rem; letter-spacing: 0.2em; margin-bottom: 1rem;" />
                <input type="password" name="new_password" placeholder="New Password" required style="margin-bottom: 1rem;" />
                <input type="password" name="confirm_password" placeholder="Confirm Password" required style="margin-bottom: 1.5rem;" />

                <button type="submit" style="width: 100%;">Reset Password</button>
                
                <a href="{{ url_for('home') }}" style="display: block; margin-top: 1.25rem; text-align: center; font-size: 0.8rem;">← Back to Sign In</a>
            </form>
        </div>
    </div>

    <script>
        // Auto-dismiss flash messages
        setTimeout(() => {
            document.querySelectorAll('.flash').forEach(m => {
                m.style.opacity = '0';
                m.style.transition = 'opacity 0.5s';
                setTimeout(() => m.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
